name: OpenSSF Scorecard

# Supply-chain posture measurement: Scorecard scores the practices this repo
# already invests in (hash-pinned actions, Dependabot with cooldowns, branch
# protection, token permissions, fuzzing/SAST presence) and publishes the
# results to the code-scanning dashboard plus the public OpenSSF API. The
# score is a regression signal — a dropped check usually means a workflow or
# settings change quietly weakened the posture.

on:
  # Manual trigger — re-run on demand (e.g. to refresh the published score after
  # a posture change, or once the repo ages past a time-based check such as
  # "Maintained", which zeroes out for repos younger than 90 days).
  workflow_dispatch:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    # Weekly re-run keeps the "Maintained" check and the published score fresh.
    - cron: "45 9 * * 1"

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write  # upload SARIF to code scanning
      id-token: write         # publish results to the OpenSSF REST API

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Fine-grained PAT (repo-scoped, Administration: Read-only) lets the
          # Branch-Protection check read classic protection rules the default
          # GITHUB_TOKEN can't see. The `|| github.token` fallback keeps the scan
          # working where the secret is absent (forks / template copies) — only
          # Branch-Protection degrades there. See README "Code scoring and attestation".
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}
          # Public repo: publish to the OpenSSF API so the score is queryable
          # (and a badge can be added to the README if wanted).
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: results.sarif
