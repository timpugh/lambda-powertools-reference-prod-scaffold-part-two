name: OpenSSF Scorecard

# Supply-chain posture measurement: Scorecard scores the practices this repo
# already invests in (hash-pinned actions, Dependabot with cooldowns, branch
# protection, token permissions, fuzzing/SAST presence) and publishes the
# results to the code-scanning dashboard plus the public OpenSSF API. The
# score is a regression signal — a dropped check usually means a workflow or
# settings change quietly weakened the posture.

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    # Weekly re-run keeps the "Maintained" check and the published score fresh.
    - cron: "45 9 * * 1"

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write  # upload SARIF to code scanning
      id-token: write         # publish results to the OpenSSF REST API

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Public repo: publish to the OpenSSF API so the score is queryable
          # (and a badge can be added to the README if wanted).
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: results.sarif
