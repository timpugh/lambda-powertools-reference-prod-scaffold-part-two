name: Dependency Audit

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      # pip-audit is environment-agnostic — it reads requirements files directly.
      # Each conflicting group is exported and audited in its own pip-audit call,
      # so the attrs<26 (cdk) and attrs>=26 (lambda) resolutions never collide
      # inside pip-audit's dry-run install. Passing all three files to a single
      # invocation would fail with ResolutionImpossible on attrs.
      - name: Install pip-audit
        run: uv sync --locked --only-group lint

      - name: Export each group to a requirements file
        run: |
          uv export --only-group cdk    --no-emit-project --format requirements.txt -o /tmp/req-cdk.txt
          uv export --only-group lambda --no-emit-project --format requirements.txt -o /tmp/req-lambda.txt
          uv export --only-group test   --no-emit-project --format requirements.txt -o /tmp/req-test.txt
          uv export --only-group lint   --no-emit-project --format requirements.txt -o /tmp/req-lint.txt
          uv export --only-group docs   --no-emit-project --format requirements.txt -o /tmp/req-docs.txt

      # The --ignore-vuln list mirrors .pre-commit-config.yaml's pip-audit hook.
      # Both CVEs affect pip (the version uv ships into the build env);
      # CVE-2026-3219 had no upstream fix as of 2026-04, CVE-2026-6357 is fixed in
      # pip 26.1. Without these suppressions the scheduled audit fails on
      # vulnerabilities we've already accepted and can't directly control.
      # RE-CHECK 2026-06: local uv now resolves pip 26.1, so CVE-2026-6357 may be
      # droppable once CI's setup-uv build env is confirmed on pip >= 26.1. Verify
      # against the CI environment (not just a laptop) before removing it here AND
      # in .pre-commit-config.yaml — the two lists must stay in sync.
      - name: Audit dependencies
        run: |
          set +e
          failed=0
          for group in cdk lambda test lint docs; do
            echo "::group::pip-audit ($group)"
            uv run pip-audit \
              --ignore-vuln CVE-2026-3219 \
              --ignore-vuln CVE-2026-6357 \
              -r /tmp/req-$group.txt || failed=1
            echo "::endgroup::"
          done
          exit $failed

      # The npm side (package.json: the CDK CLI and markdownlint, which execute
      # in CI and on deploy workstations) is outside pip-audit's view — without
      # this step a known-vulnerable pinned CLI would sit invisible between
      # Dependabot version bumps. `npm audit` reads package-lock.json and
      # queries the registry advisory endpoint directly; no `npm ci`, so no
      # install scripts execute in this job.
      #
      # `!cancelled()` so this lane still reports when pip-audit fails — the
      # audits are independent ecosystems, and a Python finding must not hide
      # npm findings (observed live: a failing pip-audit step skipped this one).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        if: ${{ !cancelled() }}
        with:
          node-version: "22"

      - name: Audit npm dev tooling
        if: ${{ !cancelled() }}
        run: npm audit --audit-level=high

      - name: Prune uv cache
        run: uv cache prune --ci
