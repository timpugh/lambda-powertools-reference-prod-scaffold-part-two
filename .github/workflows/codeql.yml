name: CodeQL

# Static analysis lane that complements bandit/ruff-S: CodeQL's dataflow
# queries catch taint-style issues (injection, path traversal, unsafe
# deserialization reaching a sink) that per-line linters structurally cannot.
# Findings land in the repository's code-scanning dashboard.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly published CodeQL queries are applied to existing
    # code, not just to future diffs.
    - cron: "30 9 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write  # upload findings to code scanning

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          languages: python
          # security-extended adds lower-confidence security queries on top of
          # the default suite — acceptable noise for a security-focused
          # reference template.
          queries: security-extended

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          category: "/language:python"
