name: CodeQL

# Static analysis lane that complements bandit/ruff-S: CodeQL's dataflow
# queries catch taint-style issues (injection, path traversal, unsafe
# deserialization reaching a sink) that per-line linters structurally cannot.
# Findings land in the repository's code-scanning dashboard.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly published CodeQL queries are applied to existing
    # code, not just to future diffs.
    - cron: "30 9 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write  # upload findings to code scanning

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: python
          # security-extended adds lower-confidence security queries on top of
          # the default suite — acceptable noise for a security-focused
          # reference template.
          queries: security-extended

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:python"
