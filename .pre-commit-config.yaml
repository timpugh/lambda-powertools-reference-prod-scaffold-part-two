repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies: [boto3-stubs==1.42.88, aws-cdk-lib==2.248.0]
        args: [--ignore-missing-imports]
        # scripts/generate_openapi.py imports from lambda/app.py (Powertools),
        # which conflicts with aws-cdk-lib on `attrs`. The pre-commit mypy env
        # holds the CDK side, so scripts/ is checked via `make typecheck`
        # inside .venv-lambda instead.
        exclude: ^(app\.py|tests/|docs/|scripts/)

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, .bandit]

  - repo: local
    hooks:
      - id: pylint
        name: pylint design checks
        entry: pylint
        language: system
        types: [python]
        exclude: ^(tests|docs)/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        # VS Code config files (.vscode/*.json) are JSONC by convention —
        # comments and trailing commas are explicitly supported by the IDE
        # and are useful for documenting non-obvious config choices inline.
        # The strict-JSON validator rejects them, so exclude that directory.
        exclude: ^\.vscode/

  - repo: local
    hooks:
      - id: xenon
        name: xenon complexity check
        entry: xenon --max-absolute B --max-modules A --max-average A lambda/ hello_world/
        language: system
        types: [python]
        pass_filenames: false
      - id: pip-audit
        name: pip-audit vulnerability scan
        # CVE-2026-3219 affects pip 26.0.1 (the version uv ships into the
        # build env) and has no upstream fix as of 2026-04. Ignoring it
        # unblocks every PR; revisit this list when pip publishes a fix.
        entry: pip-audit --ignore-vuln CVE-2026-3219
        language: system
        pass_filenames: false
        always_run: true
