# markdownlint rules for README.md, TODO.md, and docs/*.md.
# Run via `make lint-docs` (and the CI quality job). CHANGELOG.md is excluded
# at the invocation level — it is generated by git-cliff, so style fixes
# belong in cliff.toml, not in the generated output.
# Rule reference: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# Line length — prose in this repo is written with long lines (one sentence
# per line in places) and tables/code blocks routinely exceed any sane cap.
# Wrapping is an editor concern, not a correctness one.
MD013: false

# Inline HTML — docs embed <details> blocks and anchors for the rendered site.
MD033: false

# First line in a file must be a top-level heading — true for the main docs,
# but generated/partial files may open with front-matter or badges.
MD041: false

# Duplicate headings — allowed when not siblings (e.g. repeated "Usage"
# sections under different parents).
MD024:
  siblings_only: true

# Bare URLs are tolerated — several docs intentionally show raw URLs that
# readers copy rather than click.
MD034: false

# Emphasis used instead of a heading — **bold** lead-ins are used as compact
# pseudo-headings inside long sections to keep the right-nav shallow.
MD036: false

# Ordered-list prefixes may be all "1." or sequential — both styles appear.
MD029: false

# Code blocks must declare a language — enforced; it drives syntax
# highlighting on the published site.
MD040: true

# Table pipe spacing — purely cosmetic; the repo's compact tables render
# identically and re-spacing them adds diff noise to every table edit.
MD060: false
